body:
  text: 大唐北印度迦濕彌羅國三藏寶思惟於天宮寺譯如是我聞一時婆伽婆在王舍大城耆闍崛山與諸弟子共會說法於是娑婆世界主大梵天王來詣佛所右繞三匝頂禮佛足合掌向佛而白佛言唯願世尊為利益衆生故說陀羅尼神呪令諸人天普得安樂佛言善哉善哉大梵天王汝能愍念一切衆生問此利益之事汝善思念之吾當為汝分別演說此隨求即得大自在陀羅尼神呪能與一切衆生最勝安樂不為一切夜叉羅剎及癲癎病餓鬼塞揵陀鬼諸鬼神等作諸惱害亦不為寒熱等病之所侵損所在之處恆常得勝不為鬪戰怨讎之所侵害能摧他敵厭蠱呪詛不能為害先業之罪悉得消滅毒不能害火不能燒刀不能傷水不能溺不為雷電霹靂及非時惡風暴雨之所損害若有受持此神呪者所在得勝若能書寫帶在頸者若在臂者是人能成一切善事最勝清淨常為諸天龍王之所擁護又為諸佛菩薩之所憶念金剛密跡四天大王及天帝釋大梵天王毗紐天大自在天俱摩羅軍衆比那夜迦大黑天難提雞說天等晝夜而常隨逐擁護持此呪者又為摩帝揵拏天衆及餘自在諸天神衆亦如是擁護又為諸魔天衆及諸眷屬神呪諸神大威德者所謂鴦俱施神拔折羅神商羯羅神摩莫雞神毗俱知神多羅神摩訶迦羅神度多神斫羯羅波尼神大力神長壽天摩訶提毗神迦羅羯尼神花齒神摩尼珠髻神金髻神賓𦽆羅羅器神電鬘神迦羅羅利神毗俱知神堅牢地神烏陀計施神什伐栗多那那神大怒神執劍神摩尼光神闍知尼神一闍吒神佛陀陀羅波利尼神楞雞說神并餘無量諸天神等彼諸天衆悉來擁護若此神呪在身手者鬼子父母摩尼跋陀神富那跋陀神力天大力天勝棄尼神俱吒檀底神功德天大辨天等恆常隨逐而擁護之若有女人受持此神呪者有大勢力常當生男受持胎時在胎安隱産生安樂無諸疾病衆罪消滅必定無疑以福德力財穀增長所說教令人皆信受常為一切之所敬事應當潔淨若男若女童男童女持此呪者當得安樂無諸疾病色相熾盛圓滿吉祥福德增長一切呪法皆得成就帶此呪者雖未入壇即成入一切壇與入壇者成同其行不作惡夢重罪消滅有起惡心來相向者不能為害持此呪者一切樂欲所求皆得爾時世尊即說呪曰那牟婆怛他揭多囔一那牟勃陀噠摩僧祇祇曳反瓢毗㖿反上二唵三毗補羅鞞四毗末闍上㖿鞞五筏折囉二合時嚩無我反二合羅鞞六揭底丁儞反伽訶泥七伽伽那毗輸重達泥八婆跛波毗輸重達泥九唵十瞿拏尼何反跋底丁儞反十一伽伽唎尼十二祁唎祁唎十三伽末唎十四伽訶伽訶十五伽揭唎伽揭唎十六伽伽唎伽伽唎十七鉗巨嚴反長婆長唎鉗長婆重唎十八揭底丁儞反揭底十九上同伽末泥伽唎二十瞿嚧瞿嚧瞿嚧尼二十一折之列反隸折之列反隸牟質隸二十二逝曳毗逝曳二十三婆婆重㖿毗揭底丁儞反二十四揭婆三婆囉尼二十五私唎徙唎二十六以唎以唎二十七三曼多迦唎沙去尼二十八設覩噌鉢囉二合末咃儞二十九𭊽叉切我反下同𭊽叉麼麼某甲寫三十毗唎毗唎三十一毗揭多筏囉尼三十二婆重㖿波舍蘇哩蘇哩三十三質里迦末隸三十四視曳三十五視㖿婆醯三十六視㖿婆底丁禮反三十七婆伽跋底丁禮反三十八褐囉二合怛那二合摩俱吒摩羅達唎三十九毗質多羅二合鞞沙波陀唎尼四十婆伽跋底丁禮反苾地㖿二合弟上毗四十一𭊽叉都摩引吽某甲寫四十二三曼多迦囉毗輸重達儞四十三呼嚧呼嚧四十四諾剎怛囉二合摩羅陀唎尼四十五氈拏氈拏氈尼四十六鞞伽跋帝四十七婆𭓧瑟吒知剛反二合儞婆囉尼四十八設覩嚕二合博叉鉢囉二合末咃儞四十九毗闍㖿婆呬五十虎嚧虎嚧五十一姥嚧姥嚧五十二朱嚧朱嚧五十三阿去庾波剌儞五十四蘇囉婆囉摩闥儞五十五婆提婆多補視底丁儞反五十六地唎地唎五十七三曼多婆盧吉帝五十八鉢囉二合鞞重五十九蘇鉢囉二合婆重輸去悌六十婆跛波毗輸重達儞六十一馱囉馱囉馱囉尼六十二跋囉馱㘑六十三蘇姥蘇姥六十四蘇姥嚧折之列反隸六十五折之列反隸遮囉㖿𭓧瑟吒知剛反下同六十六晡囉㖿阿長賞長六十七施唎二合婆晡陀囉折㖿迦末隸六十八器史二合尼上器史二合尼上六十九婆提婆多婆囉去長陀𪀱二合俱施七十唵七十一鉢特摩二合毗輸去提七十二輸重達儞輸去提七十三婆重囉婆重囉七十四毗重唎毗重唎七十五步重嚧步重嚧七十六恾刈羅攝苾提二合七十七跋苾多囉二合目溪七十八羌迦唎七十九佉囉佉囉八十時嚩二合栗多室㘑八十一三曼多鉢囉二合薩唎多婆婆重志多輸去提八十二時嚩二合羅時嚩二合羅八十三婆提婆提拏三磨羯唎沙二合尼八十四底㖿上二合筏底丁夷反八十五怛囉怛囉八十六那伽毗盧羯儞八十七羅呼羅呼八十八呼努呼努八十九剎尼剎尼九十婆揭囉二合訶薄剎尼九十一𡦆卑孕反揭離𡦆卑孕反揭離九十二朱姥朱姥蘇姥蘇姥九十三毗折之列反㘑九十四怛囉怛囉九十五多囉㖿覩摩引吽某甲寫摩訶倍㖿九十六三牟達囉二合娑伽囉鉢唎演二合多波多羅伽伽那九十七娑曼底那九十八跋折囉二合時嚩二合囉毗輸去提九十九部唎部唎一百揭婆筏底丁禮反揭婆毗輸重達儞一俱器史二合三晡囉尼二闍羅遮羅闍栗儞三鉢囉二合筏唎沙都提婆無鵝反娑曼帝那四姪毗喻二合陀計那五阿蜜㗚二合多筏唎沙二合尼六提婆多引阿婆多㗚尼七阿毗詵遮都迷八阿蜜㗚二合多跋囉婆晡曬九𭊽叉𭊽叉麼摩某甲寫十婆怛囉二合十一婆陀平十二婆婆重曳瓢上十三蒲烏二合波達囉二合陛瓢上十四蒲烏二合鉢祇祇曳反瓢上十五婆突瑟吒二合婆重曳毗怛寫十六