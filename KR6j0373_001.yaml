不吉祥事不及其身此隨求即得陀羅尼神呪是九十九億百千那由他恆河沙等諸佛同共宣說同共印可同共讚歎同共隨喜有大勢力有大威光有大功用一切魔衆悉皆降伏此大神呪甚難可得復次大梵過去有佛名開顏含笑摩尼金寶赫奕光明出現王如來於菩提道場坐金剛座始成正覺有無央數魔及諸眷屬來詣佛所現諸神力作諸障難現諸惡相作瞋怒形雨諸器仗爾時世尊默然而坐以慈善根力憶念此呪才憶念已彼諸魔衆見世尊一一毛孔中出百千萬億兵衆身被衣甲放大光明於虛空中遊行自在時諸魔衆退失神通四散馳走復次大梵烏禪那城有王名曰梵施彼有一人犯王死罪王敕令殺即將罪人往於山中拔刀欲殺其人右臂先帶此呪由此呪力刀出火然散壞如塵是時法官見是事已怪未曾有即往白王具陳上事王告法官於彼山中有夜叉窟無量夜叉止住其中可送罪人於彼窟內於是法官奉教往送罪人到窟時諸夜叉來欲食噉呪威力故諸夜叉等皆見其人身光赫奕時諸夜叉將此罪人送至窟外恭敬禮拜於是法官復以此事具白於王王復告言將此罪人擲置大河之中奉教往擲擲是人已而不沒溺履水如地還以是事啓白大王王甚驚怪王喚罪人問其所以汝何所解罪人答王臣無所解在身唯帶隨求即得大自在陀羅尼神呪王聞是已怪歎無量佛告大梵如上所說是呪神力汝可知之必須書寫持帶於身復告大梵若欲帶此呪者當如法書寫爾時大梵白佛言世尊若欲書寫此之神呪法則云何佛告大梵先當結壇於壇四角各安一瓶盛滿香水壇內畫作二蓮花或三或四或五四面周匝作蓮花鬚又作一大開敷蓮花其莖盡懸繒帛又作一八葉蓮花一一葉上作一三叉戟莖上盡懸繒帛更作一八葉蓮花於花心中作一金剛杵一一葉上亦作一杵其花莖上盡懸繒帛又作一八葉蓮花一一葉上各作一越斧又作一蓮花於花心中畫作一刀其莖亦盡懸繒帛又畫作一劍於劍鋒上作花其花莖上亦盡懸繒帛又作一蓮花於花心中畫作一螺又作一蓮花於花心中畫作一羂索又作一蓮花於花心中畫作一火焰珠燒香散花飲食果子種種供養若欲書寫帶此呪者應當依法結如是壇餘壇方法不得相雜令寫呪人先澡浴清淨著新淨衣食三種白食所謂乳酪粳米飯無問紙素竹帛種種諸物皆悉許用書寫此呪若有婦人求産男者用牛黃書之於其帛上先向四面書此神呪內畫作一童子以寶瓔珞莊嚴其頸手捧一金鉢盛滿珍寶又於四角各畫一童子身披衣甲又作種種印若轉輪王帶者於呪心中作觀世音菩薩及帝釋形又於其上作種種佛印諸善神印悉令具足又於四角作四天王衆寶莊嚴各依本方若僧帶者於呪心中畫作一金剛神衆寶莊嚴下作一僧䠒跪合掌金剛以手按此僧頂若婆羅門帶者於呪心中作大自在天若剎利帶者於呪心中作摩醯首羅天若毗舍帶者於呪心中作毗沙門天王若首陀帶者於呪心中作斫羯羅天若童男帶者於呪心中作俱摩羅天若童女帶者於呪心中作波闍波提天從此已上所擬帶者於呪心中所畫作諸天神皆須形狀少年面貌喜悅若欲持帶此神呪者並須各各自依本法若懷胎婦人帶者於呪心中作摩訶迦羅神其面黑色若於高幢上懸者當於高處竪一高幢於其幢頭置一火焰珠於其珠內安此神呪所有一切諸惡障礙及諸疾疫悉得消滅若亢旱時於呪心中作一九頭龍若滯雨時亦作此龍並當安著有龍水中旱即下雨滯即得晴若商人帶者於呪心中作商主形所將商衆皆得安樂持此呪人自欲帶者於呪心中作一女天又於其內作星辰日月若凡人帶者唯當書寫此呪帶之佛告大梵若諸人等能如法書寫持帶之者常得安樂所為之事皆得成就現世受樂後生天上所有罪障悉得消滅常受持者恆為諸佛菩薩之所護念於夜夢中常得見佛亦得一切之所尊敬汝當護持廣令流布佛說此經已時大梵天王聞佛所說心大歡喜信受奉行那麼薩婆怛他揭哆南一那謨㪍陀達摩僧祇岐曳切瓢二唵三毗戾惟切補羅入聲揭𭌢四毗末隸闍耶揭入聲𭌢五伐扶揭切舌囉什嚩囉揭𭌢六揭底伽呵泥七伽伽上聲那毗輸達泥八薩婆跛波毗輸達泥九唵十瞿拏伐底丁以切十一伽伽上聲唎尼十二祇渠以切哩祇哩十三伽末哩十四伽呵伽呵十五伽揭哩伽揭哩十六伽伽哩伽伽哩十七鉗婆哩鉗婆哩十八揭底揭底同上十九伽末泥揭㘑二十瞿嚕瞿嚕瞿嚕尼二十一折黎隸折隸牟折隸二十二社曳毗社曳二十三薩婆婆重呼耶毗揭帝二十四揭婆三婆囉泥二十五死哩死哩蜜唎蜜唎以哩以哩二十六三曼多迦唎沙尼二十七薩婆設覩嚕鉢囉末他儞二十八洛叉𠸪叉麼麼某甲寫二十九毗利毗利毗羯多囉尼三十婆耶那舍泥三十一蘇唎蘇唎三十二質唎迦末隸三十三社曳三十四微社耶社耶縛醯三十五社耶伐底三十六薄伽伐底三十七曷羅坦那摩俱吒摩羅達唎三十八毗質多囉鞞沙嚧波陀唎尼三十九薄伽伐底苾地耶提毗四十𠸪叉覩曼莫甘切麼麼某甲寫四十一三曼多迦羅毗輸達儞四十二虎嚕虎嚕四十三諾能得切剎怛囉摩羅陀唎尼四十四氈拏氈拏氈雉儞四十五鞞伽伐底四十六薩婆突瑟吒儞嚩囉尼四十七設覩嚕博叉鉢囉末地儞四十八毗社耶婆呬儞四十九虎嚕虎嚕五十姥嚕姥嚕五十一主嚕主嚕五十二阿庾波刺儞五十三蘇囉婆囉末他儞五十四薩婆提伐多補視低五十五地唎地唎五十六三曼多婆盧吉帝五十七鉢臘鞞鉢臘鞞五十八蘇鉢臘波秫提五十九薩婆跛波毗輸達儞六十馱囉馱囉馱囉尼六十一跋囉馱㘑六十二蘇姥蘇姥六十三蘇姥嚕折㘑六十四折㘑遮羅耶突瑟吒更切六十五晡囉耶阿長呼賞六十六室唎婆晡陀囉社耶迦末隸六十